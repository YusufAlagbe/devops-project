events { worker_connections 1024; }

http {
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;

        location /node/ {
            set $upstream node-app:3000;
            proxy_pass http://$upstream/;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
        location /python/ {
            set $upstream python-app:5000;
            proxy_pass http://$upstream/;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
        location /java/ {
            set $upstream java-app:7070;
            proxy_pass http://$upstream/;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
        location /go/ {
            set $upstream go-app:8082;
            proxy_pass http://$upstream/;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
        location / {
            set $upstream php-app:80;
            proxy_pass http://$upstream/;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
